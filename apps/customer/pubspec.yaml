name: omnigo_customer
description: OMNIGO Customer - Shopping app for web/mobile/desktop
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.3

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  ui_kit:
    path: ../../packages/ui_kit
  api_client:
    path: ../../packages/api_client
  omnigo_auth:
    path: ../../packages/omnigo_auth
  core:
    path: ../../packages/core
  supabase_flutter: ^2.9.0
  flutter_bloc: ^9.1.0
  go_router: ^16.2.4
  dio: ^5.7.0
  intl: ^0.20.2
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo/omnigo-logo.jpg